<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenPool HPC Control Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); } }
  </style>
</head>
<body class="bg-gray-950 text-white">
  <div id="root"></div>
  
  <!-- React Flow & React Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@xyflow/react@12/dist/umd/index.production.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback } = React;
    const { ReactFlow, Background, Controls, MiniMap, useNodesState, useEdgesState } = window.XYFlow;

    // ── Types ────────────────────────────────────────────────────────────────────────
    const ComputeStrategy = { HybridAuto: 'HybridAuto', LANOnly: 'LANOnly', WANOnly: 'WANOnly' };

    // 1. Compute Strategy Selector
    const StrategySelector = ({ value, onChange }) => (
      <div className="strategy-selector">
        <label className="block text-sm font-medium text-gray-300 mb-2">Compute Strategy</label>
        <div className="flex gap-2">
          {(['HybridAuto', 'LANOnly', 'WANOnly']).map((s) => (
            <button
              key={s}
              onClick={() => onChange(s)}
              className={`px-4 py-2 rounded-lg font-medium transition-all ${
                value === s
                  ? s === 'HybridAuto' ? 'bg-purple-600 ring-2 ring-purple-400' :
                    s === 'LANOnly' ? 'bg-green-600 ring-2 ring-green-400' :
                    'bg-gray-600 ring-2 ring-gray-400'
                  : 'bg-gray-800 text-gray-400 hover:bg-gray-700'
              }`}
            >
              {s === 'HybridAuto' ? 'Hybrid Auto' : s === 'LANOnly' ? 'LAN Only' : 'WAN Only'}
            </button>
          ))}
        </div>
      </div>
    );

    // 2. Network Topography (Fleet View)
    const FleetView = ({ peers, filter, onFilterChange }) => (
      <div className="fleet-view bg-gray-900 rounded-xl p-4 border border-gray-700">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold text-white">Network Fleet</h3>
          <div className="flex gap-2">
            {(['all', 'LAN', 'WAN']).map((f) => (
              <button
                key={f}
                onClick={() => onFilterChange(f)}
                className={`px-3 py-1 rounded-full text-sm ${
                  filter === f 
                    ? f === 'LAN' ? 'bg-green-600' : f === 'WAN' ? 'bg-gray-500' : 'bg-purple-600'
                    : 'bg-gray-800 text-gray-400'
                }`}
              >
                {f === 'all' ? 'All' : f}
              </button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-64 overflow-y-auto">
          {peers
            .filter((p) => filter === 'all' || p.network === filter)
            .map((peer) => (
              <div key={peer.id} className="peer-card bg-gray-800 rounded-lg p-3 border border-gray-700 hover:border-gray-500 transition-colors">
                <div className="flex justify-between items-start mb-2">
                  <span className="font-mono text-xs text-gray-400">{peer.id}</span>
                  <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                    peer.network === 'LAN' ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-300'
                  }`}>
                    {peer.network}
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <div className={`w-2 h-2 rounded-full ${
                    peer.status === 'online' ? 'bg-green-500' : peer.status === 'busy' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500'
                  }`} />
                  <span className="text-sm text-gray-300 capitalize">{peer.status}</span>
                </div>
              </div>
            ))}
        </div>
      </div>
    );

    // 3. DAG Visualizer (Simplified for CDN)
    const DAGVisualizer = ({ chunks }) => {
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);

      useEffect(() => {
        if (chunks.length === 0) return;
        const cols = Math.ceil(Math.sqrt(chunks.length));
        const newNodes = [{
          id: 'root',
          type: 'input',
          data: { label: 'Job' },
          position: { x: 250, y: 0 },
          style: { background: '#8b5cf6', color: 'white', padding: '10px 20px', borderRadius: '8px' }
        }];
        
        const newEdges = chunks.map((chunk, i) => ({
          id: `e${i}`,
          source: i === 0 ? 'root' : chunks[0].id,
          target: chunk.id,
          animated: true,
          style: { stroke: '#4b5563' }
        }));

        chunks.forEach((chunk, i) => {
          const row = Math.floor(i / cols);
          const col = i % cols;
          let bg = '#6b7280';
          if (chunk.status === 'computing') bg = '#3b82f6';
          else if (chunk.status === 'verifying') bg = '#eab308';
          else if (chunk.status === 'completed') bg = '#22c55e';
          else if (chunk.status === 'failed') bg = '#ef4444';

          newNodes.push({
            id: chunk.id,
            data: { label: `${chunk.status}\n${chunk.id.slice(0,8)}` },
            position: { x: col * 120 + 50, y: row * 100 + 80 },
            style: { background: bg, color: 'white', padding: '8px', borderRadius: '8px', border: chunk.status === 'computing' ? '2px solid #60a5fa' : 'none' }
          });
        });
        
        setNodes(newNodes);
        setEdges(newEdges);
      }, [chunks]);

      return (
        <div className="dag-visualizer h-96 bg-gray-900 rounded-xl border border-gray-700 overflow-hidden">
          <div className="p-3 border-b border-gray-700 flex justify-between items-center">
            <h3 className="font-bold text-white">Task DAG</h3>
            <div className="flex gap-4 text-xs">
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-gray-500 rounded-full"/> Pending</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"/> Computing</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-yellow-500 rounded-full"/> Verifying</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 bg-green-500 rounded-full"/> Done</span>
            </div>
          </div>
          <div className="h-72">
            <ReactFlow nodes={nodes} edges={edges}>
              <Background color="#374151" gap={20} />
              <Controls />
              <MiniMap nodeColor="#6b7280" maskColor="rgba(0,0,0,0.8)" />
            </ReactFlow>
          </div>
        </div>
      );
    };

    // 4. Hardware Telemetry Dashboard
    const TelemetryPanel = ({ telemetry }) => (
      <div className="telemetry-panel grid grid-cols-2 lg:grid-cols-4 gap-4">
        {/* CPU Gauge */}
        <div className="gauge-card bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div className="text-sm text-gray-400 mb-2">CPU Load</div>
          <div className="relative w-24 h-24 mx-auto">
            <svg viewBox="0 0 100 100" className="transform -rotate-90">
              <circle cx="50" cy="50" r="40" fill="none" stroke="#374151" strokeWidth="8" />
              <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" strokeWidth="8" strokeDasharray={`${telemetry.cpuLoad * 2.51} 251`} strokeLinecap="round" />
            </svg>
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="text-xl font-bold text-white">{telemetry.cpuLoad}%</span>
            </div>
          </div>
        </div>

        {/* GPU VRAM */}
        <div className="gauge-card bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div className="text-sm text-gray-400 mb-2">GPU VRAM</div>
          <div className="relative w-24 h-24 mx-auto">
            <svg viewBox="0 0 100 100" className="transform -rotate-90">
              <circle cx="50" cy="50" r="40" fill="none" stroke="#374151" strokeWidth="8" />
              <circle cx="50" cy="50" r="40" fill="none" stroke="#a855f7" strokeWidth="8" strokeDasharray={`${(telemetry.gpuUsed / telemetry.gpuTotal) * 251} 251`} strokeLinecap="round" />
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-lg font-bold text-white">{telemetry.gpuUsed}GB</span>
              <span className="text-xs text-gray-500">/ {telemetry.gpuTotal}GB</span>
            </div>
          </div>
        </div>

        {/* Network Up */}
        <div className="gauge-card bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div className="text-sm text-gray-400 mb-2">Network Up</div>
          <div className="text-2xl font-bold text-green-400">{telemetry.networkUp} MB/s</div>
        </div>

        {/* Network Down */}
        <div className="gauge-card bg-gray-800 rounded-xl p-4 border border-gray-700">
          <div className="text-sm text-gray-400 mb-2">Network Down</div>
          <div className="text-2xl font-bold text-blue-400">{telemetry.networkDown} MB/s</div>
        </div>
      </div>
    );

    // ── Main App ──────────────────────────────────────────────────────────────────────
    const App = () => {
      const [strategy, setStrategy] = useState('HybridAuto');
      const [peerFilter, setPeerFilter] = useState('all');
      const [telemetry, setTelemetry] = useState({ cpuLoad: 45, gpuUsed: 8, gpuTotal: 16, networkUp: 125, networkDown: 340 });

      useEffect(() => {
        const interval = setInterval(() => {
          setTelemetry({
            cpuLoad: Math.floor(Math.random() * 60 + 20),
            gpuUsed: Math.floor(Math.random() * 10 + 3),
            gpuTotal: 16,
            networkUp: Math.floor(Math.random() * 150 + 50),
            networkDown: Math.floor(Math.random() * 300 + 100),
          });
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="min-h-screen bg-gray-950 text-white p-6 font-sans">
          <header className="mb-8">
            <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">
              OpenPool HPC Control Center
            </h1>
            <p className="text-gray-400 mt-2">Distributed Compute Orchestration</p>
          </header>

          <section className="mb-8">
            <h2 className="text-xl font-semibold mb-4">Hardware Telemetry</h2>
            <TelemetryPanel telemetry={telemetry} />
          </section>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section className="bg-gray-900 rounded-xl p-6 border border-gray-700">
              <h2 className="text-xl font-semibold mb-4">Submit Job</h2>
              <StrategySelector value={strategy} onChange={setStrategy} />
              <div className="mt-4 flex gap-3">
                <button className="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                  Launch Job
                </button>
              </div>
            </section>

            <FleetView 
              peers={[
                { id: 'Qmaa1...', status: 'online', network: 'LAN' },
                { id: 'Qmbb2...', status: 'busy', network: 'LAN' },
                { id: 'Qmcc3...', status: 'online', network: 'WAN' },
                { id: 'Qmdd4...', status: 'offline', network: 'WAN' },
                { id: 'Qmee5...', status: 'online', network: 'LAN' },
              ]} 
              filter={peerFilter} 
              onFilterChange={setPeerFilter} 
            />
          </div>

          <section className="mt-8">
            <DAGVisualizer chunks={[
              { id: 'chunk-1', status: 'completed' },
              { id: 'chunk-2', status: 'computing' },
              { id: 'chunk-3', status: 'pending' },
              { id: 'chunk-4', status: 'verifying' },
              { id: 'chunk-5', status: 'completed' },
              { id: 'chunk-6', status: 'completed' },
              { id: 'chunk-7', status: 'pending' },
              { id: 'chunk-8', status: 'pending' },
            ]} />
          </section>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
